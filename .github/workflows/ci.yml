name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [macos-latest]
        python-version: ["3.9", "3.12"]
        # TODO: Add windows-latest once Windows test failures are fixed
        # (Unicode encoding, path separators, symlink handling)
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml typer typing_extensions pytest pytest-timeout pytest-cov

      - name: Run tests
        run: python -m pytest tests/ -v --timeout=30

      - name: Coverage summary
        if: always()
        run: python -m pytest tests/ --timeout=30 --cov=aec --cov-report=term --cov-report=xml --cov-fail-under=65 -q

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore
